name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # cache-nix-action purge writes to the GHA cache API

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # uv path — runs for everyone
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --frozen

      - name: Inner loop (uv)
        run: make check

      # Nix leg: prove the uv2nix wiring resolves end-to-end (project + deps
      # build under pure Nix) and run flake checks. The full test suite already
      # ran once above under uv — same interpreter, same deps via uv.lock —
      # so re-running it inside nix develop would double CI time for no signal.
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Restore Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock', 'uv.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-
          gc-max-store-size-linux: 5368709120
          purge: true
          purge-prefixes: nix-${{ runner.os }}-check-
          purge-created: 604800

      - name: Build venv (nix)
        run: nix build .#default --print-build-logs

      - name: Flake check (statix + nixfmt)
        run: nix flake check --print-build-logs

  # Same suite against two independent S3 implementations. Cross-implementation
  # agreement is the point: a server that accepts-but-ignores conditional
  # writes (garage 1.3.1, rclone serve s3) fails the suite's conformance
  # fixture instantly instead of passing vacuously.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        backend: [minio, seaweedfs]
    env:
      # renovate: datasource=docker depName=minio/minio
      MINIO_VERSION: RELEASE.2025-09-07T16-13-09Z
      # renovate: datasource=docker depName=chrislusf/seaweedfs
      SEAWEEDFS_VERSION: "4.38"
    steps:
      - uses: actions/checkout@v4

      # The official minio image needs a command argument, which GH service
      # containers cannot pass — run it directly instead.
      - name: Start MinIO
        if: matrix.backend == 'minio'
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            "minio/minio:${MINIO_VERSION}" server /data
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/ready && exit 0
            sleep 2
          done
          echo "minio never became ready" >&2
          docker logs minio >&2
          exit 1

      # SeaweedFS enforces conditional writes since v3.97 (verified
      # empirically against 4.36). Single process runs master + volume +
      # filer + S3; readiness = S3 port answering ListBuckets-ish traffic.
      - name: Start SeaweedFS
        if: matrix.backend == 'seaweedfs'
        run: |
          docker run -d --name seaweedfs -p 9000:8333 \
            "chrislusf/seaweedfs:${SEAWEEDFS_VERSION}" \
            server -s3 -s3.port=8333 -ip=0.0.0.0
          for _ in $(seq 1 45); do
            curl -sf -o /dev/null http://127.0.0.1:9000/ && exit 0
            sleep 2
          done
          echo "seaweedfs never became ready" >&2
          docker logs seaweedfs >&2
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --frozen

      - name: Integration suite (${{ matrix.backend }})
        env:
          DUCKLAKE_IT_ENDPOINT: http://127.0.0.1:9000
          DUCKLAKE_IT_ACCESS_KEY: minioadmin
          DUCKLAKE_IT_SECRET_KEY: minioadmin
        run: uv run pytest -m integration --no-cov -o addopts="" -v
