name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # uv path — runs for everyone
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --frozen

      - name: Inner loop (uv)
        run: make check

      # nix path — only if the user kept flake.nix
      - name: Install Nix
        if: ${{ hashFiles('flake.nix') != '' }}
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Inner loop (nix develop)
        if: ${{ hashFiles('flake.nix') != '' }}
        run: nix develop -c make check

      # Proves the uv2nix wiring resolves end-to-end: project + deps build
      # under pure Nix (no uv at build time). Catches lockfile drift and
      # missing build-backend overrides early.
      - name: Build venv (nix)
        if: ${{ hashFiles('flake.nix') != '' }}
        run: nix build .#default --print-build-logs

      # Runs `checks.${system}.*` from flake.nix: statix + nixfmt --check.
      # Also re-evaluates devShells/packages/inputs as a smoke test.
      - name: Flake check (statix + nixfmt)
        if: ${{ hashFiles('flake.nix') != '' }}
        run: nix flake check --print-build-logs

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "mc ready local || curl -sf http://localhost:9000/minio/health/ready"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --frozen

      - name: Integration suite (MinIO)
        env:
          DUCKLAKE_IT_ENDPOINT: http://127.0.0.1:9000
          DUCKLAKE_IT_ACCESS_KEY: minioadmin
          DUCKLAKE_IT_SECRET_KEY: minioadmin
        run: uv run pytest -m integration --no-cov -o addopts="" -v
