name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # uv path — runs for everyone
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --frozen

      - name: Inner loop (uv)
        run: make check

      # nix path — only if the user kept flake.nix
      - name: Install Nix
        if: ${{ hashFiles('flake.nix') != '' }}
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Inner loop (nix develop)
        if: ${{ hashFiles('flake.nix') != '' }}
        run: nix develop -c make check

      # Proves the uv2nix wiring resolves end-to-end: project + deps build
      # under pure Nix (no uv at build time). Catches lockfile drift and
      # missing build-backend overrides early.
      - name: Build venv (nix)
        if: ${{ hashFiles('flake.nix') != '' }}
        run: nix build .#default --print-build-logs

      # Runs `checks.${system}.*` from flake.nix: statix + nixfmt --check.
      # Also re-evaluates devShells/packages/inputs as a smoke test.
      - name: Flake check (statix + nixfmt)
        if: ${{ hashFiles('flake.nix') != '' }}
        run: nix flake check --print-build-logs

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # The official minio image needs a command argument, which GH service
      # containers cannot pass — run it directly instead.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/ready && exit 0
            sleep 2
          done
          echo "minio never became ready" >&2
          docker logs minio >&2
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install deps
        run: uv sync --frozen

      - name: Integration suite (MinIO)
        env:
          DUCKLAKE_IT_ENDPOINT: http://127.0.0.1:9000
          DUCKLAKE_IT_ACCESS_KEY: minioadmin
          DUCKLAKE_IT_SECRET_KEY: minioadmin
        run: uv run pytest -m integration --no-cov -o addopts="" -v
